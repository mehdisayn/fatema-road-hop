<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fatema's Road Hop 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root{
    --bubblegum:#FF8FB1;
    --blush:#FFD1DC;
    --cream:#FFF5F8;
    --berry:#C2447A;
    --lavender:#E3C6FF;
    --mint:#B8EAD4;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;font-family:'Fredoka',sans-serif;background:var(--blush);}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#FFD1DC 0%,#FFE3EC 45%,#E3C6FF 100%);}
  #stage{position:relative;width:min(100vw,480px);height:100%;max-height:100vh;
    box-shadow:0 0 60px rgba(194,68,122,.18);overflow:hidden;}
  canvas{display:block;width:100%;height:100%;touch-action:none;}

  /* ---------- HUD ---------- */
  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
    align-items:flex-start;padding:14px 16px;pointer-events:none;z-index:5;}
  .pill{background:rgba(255,255,255,.85);backdrop-filter:blur(6px);border:2px solid var(--bubblegum);
    border-radius:999px;padding:6px 16px;color:var(--berry);font-weight:700;font-size:1.05rem;
    box-shadow:0 4px 12px rgba(194,68,122,.15);}
  #scorePill span{font-size:1.35rem;}
  #bestPill{font-size:.85rem;padding:6px 12px;border-color:var(--lavender);color:#8A5FB8;}

  /* ---------- Overlays ---------- */
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;z-index:10;padding:24px;
    background:radial-gradient(circle at 50% 30%,rgba(255,245,248,.96),rgba(255,209,220,.96));
    transition:opacity .4s ease, visibility .4s;}
  .overlay.hidden{opacity:0;visibility:hidden;pointer-events:none;}
  .kicker{font-size:.8rem;letter-spacing:.35em;text-transform:uppercase;color:#B87AA0;
    font-weight:600;margin-bottom:6px;}
  h1{font-family:'Pacifico',cursive;font-weight:400;font-size:clamp(2rem,9vw,2.9rem);
    color:var(--berry);line-height:1.25;text-shadow:0 3px 0 #fff, 0 6px 18px rgba(194,68,122,.25);}
  h1 .tiny{display:block;font-size:.55em;color:#E06C9F;}
  .sub{margin-top:14px;color:#A05A7E;font-size:1rem;font-weight:500;max-width:280px;line-height:1.5;}
  .btn{margin-top:26px;font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.15rem;
    color:#fff;background:linear-gradient(180deg,#FF9EBB,#F0679B);border:none;border-radius:999px;
    padding:15px 46px;cursor:pointer;box-shadow:0 6px 0 #C2447A, 0 12px 24px rgba(194,68,122,.35);
    transition:transform .12s ease, box-shadow .12s ease;letter-spacing:.03em;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #C2447A, 0 6px 12px rgba(194,68,122,.3);}
  .hint{margin-top:20px;font-size:.82rem;color:#C58BA8;font-weight:500;}
  .hearts-row{font-size:1.4rem;letter-spacing:.4em;margin-top:10px;animation:bob 2.4s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

  #charFrame{width:150px;height:150px;margin-bottom:6px;animation:bob 3s ease-in-out infinite;
    filter:drop-shadow(0 10px 16px rgba(194,68,122,.3));}
  #overScore{font-size:3rem;font-weight:700;color:var(--berry);margin-top:6px;}
  #overBest{font-size:.9rem;color:#B87AA0;font-weight:600;}
  #newBestTag{display:none;margin-top:8px;background:#FFE066;color:#9C6A00;font-weight:700;
    padding:4px 16px;border-radius:999px;font-size:.85rem;transform:rotate(-2deg);}

  @media (prefers-reduced-motion: reduce){
    .hearts-row,#charFrame{animation:none;}
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game"></canvas>

    <div id="hud">
      <div class="pill" id="scorePill">🌸 <span id="score">0</span></div>
      <div class="pill" id="bestPill">best <b id="best">0</b></div>
    </div>

    <!-- START SCREEN -->
    <div class="overlay" id="startScreen">
      <svg id="charFrame" viewBox="0 0 120 120"></svg>
      <div class="kicker">a game for</div>
      <h1>Fatema Tuz Zohura<span class="tiny">✿ Road Hop ✿</span></h1>
      <p class="sub">Help little Fatema hop across the candy roads — but watch out for the zooming cars!</p>
      <button class="btn" id="startBtn">Let's hop! 🎀</button>
      <div class="hint">tap = hop forward &nbsp;·&nbsp; swipe / arrows = step sideways</div>
      <div class="hearts-row">💗 🌷 💗 🌷 💗</div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div class="overlay hidden" id="overScreen">
      <svg id="charFrame2" viewBox="0 0 120 120" width="130" height="130"></svg>
      <div class="kicker">oopsie!</div>
      <h1 style="font-size:clamp(1.8rem,8vw,2.4rem)">Ouchie, Fatema!</h1>
      <div id="overScore">0</div>
      <div id="overBest">best: 0</div>
      <div id="newBestTag">⭐ new best! ⭐</div>
      <button class="btn" id="retryBtn">Try again 💕</button>
      <div class="hearts-row">🩷 ✨ 🩷 ✨ 🩷</div>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');

  let W = 0, H = 0, DPR = 1;
  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = stage.clientWidth; H = stage.clientHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize); resize();

  // ---------- grid ----------
  const COLS = 7;
  const cell = () => W / COLS;

  // ---------- palettes ----------
  const GRASS = ['#C9F2DC','#BDEDD3'];
  const ROAD  = '#FBD9E6';
  const ROAD_EDGE = '#F5B8CF';
  const CAR_COLORS = ['#FF9EBB','#C9A7F5','#9BD9F0','#FFD98E','#A8E6CF','#F6A6C9'];
  const FLOWERS = ['#FF8FB1','#E3C6FF','#FFE066','#FFFFFF'];

  // ---------- state ----------
  let rows = [];          // rows[i] = {type:'grass'|'road', dir, speed, cars:[], flowers:[]}
  let player, camY, score, best = 0, running = false, dead = false;
  let particles = [], t = 0, lastTime = 0;
  let hopAnim = 0;        // 0..1 hop bounce
  let rowIndexBase = 0;   // world row index of rows[0]

  function rnd(a,b){ return a + Math.random()*(b-a); }
  function ri(a,b){ return Math.floor(rnd(a,b+1)); }

  function makeRow(worldIdx){
    // first few rows always grass
    if (worldIdx < 3) return grassRow();
    // avoid super long road chains
    const prevRoad = rows.length && rows[rows.length-1].type === 'road';
    const roadChance = prevRoad ? 0.45 : 0.62;
    if (Math.random() < roadChance){
      const dir = Math.random() < .5 ? 1 : -1;
      const speed = rnd(60, 110) + Math.min(worldIdx*1.4, 90); // gets faster
      const carCount = ri(1,2) + (Math.random() < Math.min(worldIdx/120,.5) ? 1 : 0);
      const cars = [];
      const gap = (COLS+3) / carCount;
      for (let i=0;i<carCount;i++){
        cars.push({ x: rnd(0, gap) + i*gap, color: CAR_COLORS[ri(0,CAR_COLORS.length-1)], w: rnd(1.35,1.65) });
      }
      return { type:'road', dir, speed, cars };
    }
    return grassRow();
  }
  function grassRow(){
    const flowers = [];
    const n = ri(1,3);
    for (let i=0;i<n;i++){
      flowers.push({ c: ri(0,COLS-1), off: rnd(.2,.8), color: FLOWERS[ri(0,FLOWERS.length-1)], s: rnd(.12,.2) });
    }
    return { type:'grass', flowers };
  }

  function reset(){
    rows = []; rowIndexBase = 0;
    for (let i=0;i<40;i++) rows.push(makeRow(i));
    player = { col: 3, row: 1, x: 3, y: 1 };   // x,y = animated position
    camY = 0; score = 0; dead = false; hopAnim = 0;
    particles = [];
    updateHud();
  }

  function updateHud(){
    document.getElementById('score').textContent = score;
    document.getElementById('best').textContent = best;
  }

  // ---------- drawing helpers ----------
  function rrect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawHeart(x,y,s,color,alpha=1){
    ctx.save(); ctx.globalAlpha = alpha; ctx.translate(x,y); ctx.scale(s,s);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0,3);
    ctx.bezierCurveTo(-4,-1,-3,-5,0,-3.2);
    ctx.bezierCurveTo(3,-5,4,-1,0,3);
    ctx.fill(); ctx.restore();
  }

  function drawFlower(x,y,s,color){
    ctx.save(); ctx.translate(x,y);
    ctx.fillStyle = color;
    for (let i=0;i<5;i++){
      const a = i/5*Math.PI*2;
      ctx.beginPath();
      ctx.arc(Math.cos(a)*s, Math.sin(a)*s, s*.75, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle = '#FFE066';
    ctx.beginPath(); ctx.arc(0,0,s*.65,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ---------- Fatema (canvas) ----------
  function drawFatema(cx, cy, size, hop){
    // hop = 0..1 bounce; lifts her and squashes shadow
    const lift = Math.sin(hop*Math.PI) * size*.35;
    ctx.save();
    // shadow
    ctx.fillStyle = 'rgba(194,68,122,.18)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + size*.52, size*.42*(1-hop*.3), size*.13*(1-hop*.3), 0, 0, Math.PI*2);
    ctx.fill();

    ctx.translate(cx, cy - lift);
    const s = size/100; ctx.scale(s,s);

    // dress
    ctx.fillStyle = '#F0679B';
    ctx.beginPath();
    ctx.moveTo(-20, 10);
    ctx.quadraticCurveTo(0, 2, 20, 10);
    ctx.lineTo(26, 46);
    ctx.quadraticCurveTo(0, 56, -26, 46);
    ctx.closePath(); ctx.fill();
    // dress trim
    ctx.strokeStyle = '#FFD1DC'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-23,40); ctx.quadraticCurveTo(0,50,23,40); ctx.stroke();
    // tiny heart on dress
    drawHeart(0, 30, 1.6, '#FFF');

    // feet
    ctx.fillStyle = '#C2447A';
    rrect(-16, 46, 12, 8, 4); ctx.fill();
    rrect(4, 46, 12, 8, 4); ctx.fill();

    // arms
    ctx.strokeStyle = '#F0679B'; ctx.lineWidth = 7; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-18,16); ctx.quadraticCurveTo(-28,24,-24,32); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(18,16); ctx.quadraticCurveTo(28,24,24,32); ctx.stroke();
    ctx.fillStyle = '#F7CBA8';
    ctx.beginPath(); ctx.arc(-24,33,4.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(24,33,4.5,0,Math.PI*2); ctx.fill();

    // hijab drape (behind head, over shoulders)
    ctx.fillStyle = '#2E2E38';
    ctx.beginPath();
    ctx.moveTo(-26, -8);
    ctx.quadraticCurveTo(-30, 18, -14, 20);
    ctx.lineTo(14, 20);
    ctx.quadraticCurveTo(30, 18, 26, -8);
    ctx.closePath(); ctx.fill();

    // black hijab head wrap
    ctx.fillStyle = '#2E2E38';
    ctx.beginPath(); ctx.arc(0,-16,23,0,Math.PI*2); ctx.fill();
    // hijab shine
    ctx.strokeStyle = '#52525F'; ctx.lineWidth = 3; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(-3,-18,18, Math.PI*1.15, Math.PI*1.55); ctx.stroke();

    // face opening inside the hijab
    ctx.fillStyle = '#F7CBA8';
    ctx.beginPath(); ctx.ellipse(0,-13.5,14.5,16,0,0,Math.PI*2); ctx.fill();
    // hijab pin flower
    drawFlower(15, -3, 3, '#FFE066');

    // round glasses
    ctx.strokeStyle = '#8A5FB8'; ctx.lineWidth = 2.6;
    ctx.fillStyle = 'rgba(255,255,255,.45)';
    ctx.beginPath(); ctx.arc(-8,-15,7,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(8,-15,7,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-1.4,-15); ctx.lineTo(1.4,-15); ctx.stroke();

    // eyes
    ctx.fillStyle = '#5A3A4A';
    ctx.beginPath(); ctx.arc(-8,-15,2.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8,-15,2.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(-7.2,-15.8,.9,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8.8,-15.8,.9,0,Math.PI*2); ctx.fill();

    // blush
    ctx.fillStyle = 'rgba(255,120,160,.4)';
    ctx.beginPath(); ctx.ellipse(-13,-8,3.4,2,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(13,-8,3.4,2,0,0,Math.PI*2); ctx.fill();

    // smile
    ctx.strokeStyle = '#B65477'; ctx.lineWidth = 2; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(0,-8.5,4,Math.PI*0.15,Math.PI*0.85); ctx.stroke();

    ctx.restore();
  }

  // SVG copy of Fatema for the overlays (mirrors canvas art)
  function fatemaSVG(sad){
    const mouth = sad
      ? `<path d="M-4 -6 Q0 -11 4 -6" stroke="#B65477" stroke-width="2.2" fill="none" stroke-linecap="round"/>`
      : `<path d="M-4 -9 a4.5 4.5 0 0 0 8 0" stroke="#B65477" stroke-width="2.2" fill="none" stroke-linecap="round"/>`;
    return `
    <g transform="translate(60,62)">
      <ellipse cx="0" cy="52" rx="34" ry="9" fill="rgba(194,68,122,.15)"/>
      <path d="M-20 10 Q0 2 20 10 L26 46 Q0 56 -26 46 Z" fill="#F0679B"/>
      <path d="M-23 40 Q0 50 23 40" stroke="#FFD1DC" stroke-width="3" fill="none"/>
      <rect x="-16" y="46" width="12" height="8" rx="4" fill="#C2447A"/>
      <rect x="4" y="46" width="12" height="8" rx="4" fill="#C2447A"/>
      <path d="M-18 16 Q-28 24 -24 32" stroke="#F0679B" stroke-width="7" stroke-linecap="round" fill="none"/>
      <path d="M18 16 Q28 24 24 32" stroke="#F0679B" stroke-width="7" stroke-linecap="round" fill="none"/>
      <circle cx="-24" cy="33" r="4.5" fill="#F7CBA8"/><circle cx="24" cy="33" r="4.5" fill="#F7CBA8"/>
      <path d="M-26 -8 Q-30 18 -14 20 L14 20 Q30 18 26 -8 Z" fill="#2E2E38"/>
      <circle cx="0" cy="-16" r="23" fill="#2E2E38"/>
      <path d="M-18 -28 Q-11 -35 -3 -36" stroke="#52525F" stroke-width="3" fill="none" stroke-linecap="round"/>
      <ellipse cx="0" cy="-13.5" rx="14.5" ry="16" fill="#F7CBA8"/>
      <circle cx="-8" cy="-15" r="7" fill="rgba(255,255,255,.5)" stroke="#8A5FB8" stroke-width="2.6"/>
      <circle cx="8" cy="-15" r="7" fill="rgba(255,255,255,.5)" stroke="#8A5FB8" stroke-width="2.6"/>
      <line x1="-1.4" y1="-15" x2="1.4" y2="-15" stroke="#8A5FB8" stroke-width="2.6"/>
      <circle cx="-8" cy="-15" r="2.4" fill="#5A3A4A"/><circle cx="8" cy="-15" r="2.4" fill="#5A3A4A"/>
      <circle cx="-7.2" cy="-15.8" r=".9" fill="#fff"/><circle cx="8.8" cy="-15.8" r=".9" fill="#fff"/>
      <ellipse cx="-13" cy="-8" rx="3.4" ry="2" fill="rgba(255,120,160,.4)"/>
      <ellipse cx="13" cy="-8" rx="3.4" ry="2" fill="rgba(255,120,160,.4)"/>
      ${mouth}
      <circle cx="15" cy="-3" r="3.4" fill="#FFE066"/>
      <circle cx="12" cy="-5" r="2" fill="#FFD1DC"/><circle cx="18" cy="-5" r="2" fill="#FFD1DC"/>
      <circle cx="12" cy="-1" r="2" fill="#FFD1DC"/><circle cx="18" cy="-1" r="2" fill="#FFD1DC"/>
    </g>`;
  }
  document.getElementById('charFrame').innerHTML = fatemaSVG(false);
  document.getElementById('charFrame2').innerHTML = fatemaSVG(true);

  // ---------- cars ----------
  function drawCar(px, py, wCells, color, dir, rowH){
    const cw = wCells * cell(), ch = rowH * .62;
    const x = px, y = py + (rowH - ch)/2;
    ctx.save();
    // body
    ctx.fillStyle = color;
    rrect(x, y, cw, ch, ch*.35); ctx.fill();
    // roof / window
    ctx.fillStyle = 'rgba(255,255,255,.75)';
    const wx = dir === 1 ? x + cw*.18 : x + cw*.34;
    rrect(wx, y + ch*.14, cw*.48, ch*.4, ch*.18); ctx.fill();
    // heart decal
    drawHeart(x + (dir===1 ? cw*.78 : cw*.22), y + ch*.62, ch*.09, '#FFF', .9);
    // wheels
    ctx.fillStyle = '#7A4A5E';
    const wr = ch*.2;
    ctx.beginPath(); ctx.arc(x+cw*.24, y+ch+1, wr, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+cw*.76, y+ch+1, wr, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFD1DC';
    ctx.beginPath(); ctx.arc(x+cw*.24, y+ch+1, wr*.45, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+cw*.76, y+ch+1, wr*.45, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ---------- particles ----------
  function burst(x,y,n,type){
    for (let i=0;i<n;i++){
      particles.push({
        x, y, vx: rnd(-60,60), vy: rnd(-140,-40),
        life: rnd(.5,.9), age: 0, type,
        color: type==='heart' ? ['#FF8FB1','#F0679B','#E3C6FF'][ri(0,2)] : '#FFE066',
        s: rnd(.7,1.4)
      });
    }
  }

  // ---------- gameplay ----------
  function hop(dcol, drow){
    if (!running || dead) return;
    const nc = Math.max(0, Math.min(COLS - 1, player.col + dcol));
    const nr = Math.max(0, player.row + drow);
    player.col = nc;
    player.row = nr;
    hopAnim = 1;
    if (drow > 0){
      score = Math.max(score, player.row - 1);
      updateHud();
    }
    // ensure rows exist ahead
    while (rows.length < player.row - rowIndexBase + 30){
      rows.push(makeRow(rowIndexBase + rows.length));
    }
  }

  function die(){
    if (dead) return;
    dead = true; running = false;
    burst(player.x !== undefined ? colX(player.x)+cell()/2 : W/2, rowScreenY(player.y)+rowH()/2, 14, 'heart');
    const isBest = score > best;
    if (isBest) best = score;
    updateHud();
    setTimeout(() => {
      document.getElementById('overScore').textContent = '🌸 ' + score;
      document.getElementById('overBest').textContent = 'best: ' + best;
      document.getElementById('newBestTag').style.display = isBest && score > 0 ? 'inline-block' : 'none';
      document.getElementById('overScreen').classList.remove('hidden');
    }, 550);
  }

  const rowH = () => Math.min(cell(), H/9);
  function rowScreenY(worldRow){
    return H - (worldRow - camY) * rowH() - rowH()*1.6;
  }
  const colX = c => c * cell();

  function update(dt){
    t += dt;
    // smooth player position
    player.x += (player.col - player.x) * Math.min(1, dt*14);
    player.y += (player.row - player.y) * Math.min(1, dt*14);
    if (hopAnim > 0) hopAnim = Math.max(0, hopAnim - dt*3.2);

    // camera follows, and slowly creeps up as pressure
    const targetCam = Math.max(camY, player.y - 2.5);
    camY += (targetCam - camY) * Math.min(1, dt*5);
    if (running && score > 2) camY += dt * (0.25 + Math.min(score*0.006, .45));

    // fell behind camera bottom
    if (running && rowScreenY(player.y) > H + rowH()*.5) die();

    // move cars & collisions
    const prow = Math.round(player.y);
    rows.forEach((row, i) => {
      if (row.type !== 'road') return;
      row.cars.forEach(car => {
        car.x += row.dir * row.speed * dt / cell();
        const span = COLS + 4;
        if (row.dir === 1 && car.x > COLS + 2) car.x = -car.w - rnd(0,2);
        if (row.dir === -1 && car.x < -car.w - 2) car.x = COLS + rnd(0,2);
        // collision on player row
        const worldIdx = rowIndexBase + i;
        if (running && worldIdx === prow){
          const px = player.x + .5;
          if (px > car.x + .12 && px < car.x + car.w - .12) die();
        }
      });
    });

    // particles
    particles.forEach(p => { p.age += dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 240*dt; });
    particles = particles.filter(p => p.age < p.life);

    // prune far-behind rows
    while (rowIndexBase < camY - 4){
      rows.shift(); rowIndexBase++;
    }
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    const rh = rowH();

    // sky glow at top
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#FFE9F1'); g.addColorStop(1,'#FFDDE9');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

    // rows (draw far to near)
    for (let i = rows.length-1; i >= 0; i--){
      const worldIdx = rowIndexBase + i;
      const y = rowScreenY(worldIdx);
      if (y > H + rh || y + rh < -rh) continue;
      const row = rows[i];
      if (row.type === 'grass'){
        ctx.fillStyle = GRASS[worldIdx % 2];
        ctx.fillRect(0, y, W, rh+1);
        row.flowers.forEach(f => drawFlower(colX(f.c) + f.off*cell(), y + rh*.5, rh*f.s, f.color));
      } else {
        ctx.fillStyle = ROAD;
        ctx.fillRect(0, y, W, rh+1);
        // dashed center line of tiny hearts
        ctx.fillStyle = ROAD_EDGE;
        ctx.fillRect(0, y, W, 3); ctx.fillRect(0, y+rh-3, W, 3);
        for (let hx = ((t*20) % 60) - 60; hx < W; hx += 60){
          drawHeart(hx, y + rh/2, rh*.05, '#F7A8C6');
        }
      }
    }
    // cars on top of roads
    rows.forEach((row,i) => {
      if (row.type !== 'road') return;
      const y = rowScreenY(rowIndexBase + i);
      if (y > H + rh || y + rh < -rh) return;
      row.cars.forEach(car => drawCar(colX(car.x), y, car.w, car.color, row.dir, rh));
    });

    // Fatema
    if (!dead || t % .2 < .12){
      drawFatema(colX(player.x) + cell()/2, rowScreenY(player.y) + rh*.45, rh*.95, hopAnim);
    }

    // particles
    particles.forEach(p => {
      const a = 1 - p.age/p.life;
      if (p.type === 'heart') drawHeart(p.x, p.y, p.s, p.color, a);
      else { ctx.save(); ctx.globalAlpha = a; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,2.4*p.s,0,Math.PI*2); ctx.fill(); ctx.restore(); }
    });
  }

  function loop(now){
    const dt = Math.min((now - lastTime)/1000, .05);
    lastTime = now;
    update(dt); render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(now => { lastTime = now; requestAnimationFrame(loop); });

  // ---------- input ----------
  function forward(){
    hop(0, 1);
    burst(colX(player.col)+cell()/2, rowScreenY(player.row+1)+rowH()*.8, 4, 'spark');
  }
  let touchStart = null;
  canvas.addEventListener('pointerdown', e => { touchStart = {x:e.clientX, y:e.clientY, t:performance.now()}; });
  canvas.addEventListener('pointerup', e => {
    if (!touchStart) return;
    const dx = e.clientX - touchStart.x, dy = e.clientY - touchStart.y;
    const dist = Math.hypot(dx,dy);
    if (dist < 24){ forward(); }
    else if (Math.abs(dx) > Math.abs(dy)) hop(dx > 0 ? 1 : -1, 0);
    else if (dy < 0) forward();
    touchStart = null;
  });
  window.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w') forward();
    if (e.key === 'ArrowLeft' || e.key === 'a') hop(-1, 0);
    if (e.key === 'ArrowRight' || e.key === 'd') hop(1, 0);
  });

  // ---------- screens ----------
  function start(){
    reset();
    running = true;
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('overScreen').classList.add('hidden');
  }
  document.getElementById('startBtn').addEventListener('click', start);
  document.getElementById('retryBtn').addEventListener('click', start);

  reset();
})();
</script>
</body>
</html>
